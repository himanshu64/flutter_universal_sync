name: pagination_app
description: "Offline-cached infinite pagination — VIPER on flutter_universal_sync"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_universal_sync_core:
    path: ../../packages/flutter_universal_sync_core
  flutter_universal_sync_hive:
    path: ../../packages/flutter_universal_sync_hive
  flutter_universal_sync_rest:
    path: ../../packages/flutter_universal_sync_rest
  http: ^1.2.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_universal_sync_core:
    path: ../../packages/flutter_universal_sync_core

flutter:
  uses-material-design: true
