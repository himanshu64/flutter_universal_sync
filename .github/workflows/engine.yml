name: pkg-engine

on:
  push:
    branches: [main]
    paths:
      - 'packages/flutter_universal_sync_engine/**'
      - 'packages/flutter_universal_sync_core/**'
      - '.github/workflows/engine.yml'
  pull_request:
    paths:
      - 'packages/flutter_universal_sync_engine/**'
      - 'packages/flutter_universal_sync_core/**'
      - '.github/workflows/engine.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutter_universal_sync_engine
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.4.0'
      - name: Get dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Run tests with coverage
        run: dart test --coverage=coverage
      - name: Format coverage
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib --check-ignore
      - name: Enforce coverage >= 95%
        run: |
          LINE_RATE=$(awk -F: '
            /^DA:/ {
              split($2, a, ","); total++;
              if (a[2] > 0) hit++;
            }
            END {
              if (total == 0) { print "0"; exit }
              printf "%.2f\n", hit/total*100
            }
          ' coverage/lcov.info)
          echo "Coverage: $LINE_RATE%"
          awk -v rate="$LINE_RATE" 'BEGIN { exit (rate+0 < 95.0) ? 1 : 0 }'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage
          path: packages/flutter_universal_sync_engine/coverage/lcov.info
