name: pkg-background

on:
  push:
    branches: [main]
    paths:
      - 'packages/flutter_universal_sync_background/**'
      - 'packages/flutter_universal_sync_core/**'
      - '.github/workflows/background.yml'
  pull_request:
    paths:
      - 'packages/flutter_universal_sync_background/**'
      - 'packages/flutter_universal_sync_core/**'
      - '.github/workflows/background.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutter_universal_sync_background
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.4.0'
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart test -x integration --coverage=coverage
      - run: dart pub global activate coverage
      - run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.dart_tool/package_config.json --report-on=lib
      - name: Enforce coverage >= 95%
        run: |
          LINE_RATE=$(awk -F: '
            /^DA:/ { split($2, a, ","); total++; if (a[2] > 0) hit++; }
            END { if (total == 0) { print "0"; exit } printf "%.2f\n", hit/total*100 }
          ' coverage/lcov.info)
          echo "Coverage: $LINE_RATE%"
          awk -v rate="$LINE_RATE" 'BEGIN { exit (rate+0 < 95.0) ? 1 : 0 }'

