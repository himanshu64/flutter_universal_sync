<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2330"/>
      <stop offset="0.55" stop-color="#222a52"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>

  <!-- title -->
  <text x="64" y="118" font-size="52" font-weight="700" fill="#ffffff">flutter_universal_sync</text>
  <rect x="66" y="138" width="220" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="64" y="184" font-size="24" fill="#c7cce0">Offline-first · backend-agnostic · storage-agnostic sync for Flutter</text>

  <!-- flow diagram -->
  <g font-size="16" fill="#e6e9f5" text-anchor="middle">
    <rect x="64" y="232" width="170" height="68" rx="12" fill="#ffffff14" stroke="#ffffff33"/>
    <text x="149" y="262" font-weight="600">Your App</text>
    <text x="149" y="284" font-size="13" fill="#9aa0b4">repository</text>

    <rect x="284" y="232" width="200" height="68" rx="12" fill="#5eead41f" stroke="#5eead455"/>
    <text x="384" y="262" font-weight="600" fill="#5eead4">SyncEngine</text>
    <text x="384" y="284" font-size="13" fill="#9aa0b4">queue · pull · resolve</text>

    <rect x="534" y="232" width="280" height="68" rx="12" fill="#ffffff14" stroke="#ffffff33"/>
    <text x="674" y="258" font-weight="600">LocalDatabaseAdapter</text>
    <text x="674" y="285" font-size="13" fill="#9aa0b4">sqflite · drift · hive · objectbox</text>

    <rect x="864" y="232" width="272" height="68" rx="12" fill="#ffffff14" stroke="#ffffff33"/>
    <text x="1000" y="258" font-weight="600">RemoteSyncAdapter</text>
    <text x="1000" y="285" font-size="13" fill="#9aa0b4">rest · supabase · firebase · graphql</text>

    <g stroke="url(#accent)" stroke-width="2.5" fill="none">
      <path d="M234 266 H284"/>
      <path d="M484 266 H534"/>
      <path d="M814 266 H864"/>
    </g>
  </g>

  <!-- capability pills -->
  <g font-size="14" fill="#0f1116" text-anchor="middle" font-weight="600">
    <rect x="64" y="330" width="150" height="30" rx="15" fill="#5eead4"/>
    <text x="139" y="350">operation queue</text>
    <rect x="226" y="330" width="170" height="30" rx="15" fill="#a7f3d0"/>
    <text x="311" y="350">optimistic updates</text>
    <rect x="408" y="330" width="150" height="30" rx="15" fill="#bfdbfe"/>
    <text x="483" y="350">retry + backoff</text>
    <rect x="570" y="330" width="180" height="30" rx="15" fill="#c7d2fe"/>
    <text x="660" y="350">conflict resolution</text>
    <rect x="762" y="330" width="160" height="30" rx="15" fill="#ddd6fe"/>
    <text x="842" y="350">background sync</text>
  </g>

  <text x="1136" y="120" font-size="15" fill="#9aa0b4" text-anchor="end">12 packages · pure-Dart engine · MIT</text>
</svg>
