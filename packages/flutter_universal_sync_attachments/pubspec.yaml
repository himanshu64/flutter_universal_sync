name: flutter_universal_sync_attachments
description: Resumable chunked media/attachment uploads for the flutter_universal_sync family — upload large files in chunks over an injectable HTTP client, resuming from a server-reported offset.
version: 0.1.0
homepage: https://github.com/REPLACE_ME/flutter_universal_sync
repository: https://github.com/REPLACE_ME/flutter_universal_sync
issue_tracker: https://github.com/REPLACE_ME/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  http: ^1.2.2

dev_dependencies:
  coverage: ^1.8.0
  lints: ^4.0.0
  test: ^1.25.0
