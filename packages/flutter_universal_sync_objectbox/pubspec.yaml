name: flutter_universal_sync_objectbox
description: ObjectBox LocalDatabaseAdapter for the flutter_universal_sync family. Persists the sync queue and engine meta KV in ObjectBox alongside your domain rows.
version: 0.1.0
homepage: https://github.com/REPLACE_ME/flutter_universal_sync
repository: https://github.com/REPLACE_ME/flutter_universal_sync
issue_tracker: https://github.com/REPLACE_ME/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  flutter_universal_sync_core: ^0.2.0
  objectbox: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.0
  coverage: ^1.8.0
  lints: ^4.0.0
  objectbox_generator: ^4.0.0
  test: ^1.25.0

dependency_overrides:
  flutter_universal_sync_core:
    path: ../flutter_universal_sync_core
