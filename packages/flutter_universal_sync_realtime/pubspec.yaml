name: flutter_universal_sync_realtime
description: Real-time WebSocket/SSE channel for the flutter_universal_sync family — applies live server-push row events to a local store, reconnecting with backoff.
version: 0.1.1
homepage: https://github.com/himanshu64/flutter_universal_sync
repository: https://github.com/himanshu64/flutter_universal_sync
issue_tracker: https://github.com/himanshu64/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  flutter_universal_sync_core: ^0.3.0

dev_dependencies:
  coverage: ^1.8.0
  lints: ^4.0.0
  test: ^1.25.0
  # Test-only: drives the live integration test against a real WebSocket.
  # The package itself stays transport-agnostic (the stream is injected).
  web_socket_channel: ^2.4.5

dependency_overrides:
  flutter_universal_sync_core:
    path: ../flutter_universal_sync_core
