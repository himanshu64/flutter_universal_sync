name: flutter_universal_sync_background
description: Headless background sync for the flutter_universal_sync family — runs the engine from an OS-scheduled background isolate (WorkManager / BGTaskScheduler).
version: 0.2.0
homepage: https://github.com/himanshu64/flutter_universal_sync
repository: https://github.com/himanshu64/flutter_universal_sync
issue_tracker: https://github.com/himanshu64/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  flutter_universal_sync_core: ^0.3.0
  flutter_universal_sync_engine: ^0.1.0

dev_dependencies:
  coverage: ^1.8.0
  lints: ^4.0.0
  test: ^1.25.0

dependency_overrides:
  flutter_universal_sync_core:
    path: ../flutter_universal_sync_core
  flutter_universal_sync_engine:
    path: ../flutter_universal_sync_engine
