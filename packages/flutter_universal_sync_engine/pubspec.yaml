name: flutter_universal_sync_engine
description: Sync engine for the flutter_universal_sync family. Drains the queue, pulls deltas, runs conflict resolvers — pure Dart, no Flutter dependency.
version: 0.1.2
homepage: https://github.com/himanshu64/flutter_universal_sync
repository: https://github.com/himanshu64/flutter_universal_sync
issue_tracker: https://github.com/himanshu64/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  flutter_universal_sync_core: ^0.3.0
  meta: ^1.10.0

dev_dependencies:
  coverage: ^1.8.0
  lints: ^4.0.0
  test: ^1.25.0

dependency_overrides:
  flutter_universal_sync_core:
    path: ../flutter_universal_sync_core
