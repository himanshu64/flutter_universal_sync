name: flutter_universal_sync_drift
description: drift LocalDatabaseAdapter for the flutter_universal_sync family. Persists the sync queue and engine meta KV in SQLite alongside your domain tables.
version: 0.1.0
homepage: https://github.com/himanshu64/flutter_universal_sync
repository: https://github.com/himanshu64/flutter_universal_sync
issue_tracker: https://github.com/himanshu64/flutter_universal_sync/issues

environment:
  sdk: ^3.4.0

dependencies:
  drift: ^2.0.0
  flutter_universal_sync_core: ^0.3.0

dev_dependencies:
  coverage: ^1.8.0
  lints: ^4.0.0
  test: ^1.25.0

dependency_overrides:
  flutter_universal_sync_core:
    path: ../flutter_universal_sync_core
